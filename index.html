<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Patrimonia</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#060810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Patrimonia" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Patrimonia — Suivi de patrimoine personnel" />
  <script>(function(){var t=localStorage.getItem('patrimonia_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>@font-face{font-family:'Aptos';src:local('Aptos'),local('Aptos-Regular')}@font-face{font-family:'Aptos';src:local('Aptos Medium'),local('Aptos-Medium');font-weight:500}@font-face{font-family:'Aptos';src:local('Aptos SemiBold'),local('Aptos-SemiBold');font-weight:600}</style>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0b0f; --surface:#111116; --surface2:#18181f;
      --border:rgba(255,255,255,0.06); --border2:rgba(59,130,246,0.28);
      --accent:#8b5cf6; --accent2:#a78bfa; --accent3:#c4b5fd;
      --text:#e8edf5; --text2:#a8b4c8; --muted:#52525b; --danger:#ef4444;
    }
    :root[data-theme="light"]{
      --bg:#f4f5f7; --surface:#ffffff; --surface2:#f0f1f4;
      --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
      --accent:#7c3aed; --accent2:#6d28d9; --accent3:#5b21b6;
      --text:#111827; --text2:#374151; --muted:#9ca3af; --danger:#dc2626;
    }
    body{
      font-family:'Aptos','Segoe UI','Inter',sans-serif; font-weight:400;
      background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      overflow:hidden; position:relative;
    }
    body::before{
      content:''; position:fixed; inset:0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 10%, rgba(37,99,235,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 50% 70% at 85% 90%, rgba(29,78,216,0.09) 0%, transparent 65%),
        radial-gradient(ellipse 30% 30% at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
      pointer-events:none;
    }
    body::after{
      content:''; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size:50px 50px; pointer-events:none;
    }
    .wrap{
      width:100%; max-width:400px; padding:24px;
      position:relative; z-index:10;
      animation:up .7s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

    /* Brand */
    .brand{text-align:center; margin-bottom:44px;}
    .brand-row{display:inline-flex; align-items:center; gap:14px; margin-bottom:10px;}
    .brand-icon{
      width:46px; height:46px;
      background:var(--accent);
      border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 28px rgba(59,130,246,0.4);
      flex-shrink:0;
    }
    .brand-icon svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
    .brand-name{
      font-family:'Aptos','Segoe UI','Inter',sans-serif;
      font-size:26px; font-weight:400;
      letter-spacing:-0.3px; 
    }
    .brand-name b{font-weight:500; color:var(--accent2);}
    .brand-tag{
      font-family:'Aptos','Segoe UI','Inter',sans-serif; font-weight:200;
      font-size:10px; letter-spacing:5px;
       color:var(--muted);
    }

    /* Card */
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:8px; padding:32px 28px;
      box-shadow:0 0 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(59,130,246,0.06);
    }

    /* Tabs */
    .tabs{
      display:flex; background:var(--surface2);
      border:1px solid var(--border);
      border-radius:8px; padding:3px; margin-bottom:28px;
    }
    .tab{
      flex:1; text-align:center; padding:8px 4px;
      border-radius:8px; font-size:11px; font-weight:400;
      letter-spacing:0.8px; cursor:pointer;
      transition:all .2s; color:var(--muted);
      border:none; background:none; font-family:'Aptos','Segoe UI','Inter',sans-serif;
    }
    .tab.active{
      background:linear-gradient(135deg,#1e3a6e,#1d4ed8);
      color:var(--accent3);
      box-shadow:0 2px 10px rgba(139,92,246,0.3);
    }

    /* Form */
    .fg{margin-bottom:18px;}
    label{
      display:block; font-size:9.5px; font-weight:400;
      color:var(--muted); margin-bottom:7px;
       letter-spacing:1.8px;
    }
    input{
      width:100%; background:var(--surface2);
      border:1px solid var(--border);
      border-radius:8px; padding:12px 15px;
      color:var(--text); font-family:'Aptos','Segoe UI','Inter',sans-serif;
      font-size:13px; font-weight:400;
      transition:all .2s; outline:none;
    }
    input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
    input::placeholder{color:var(--muted);}

    /* Button */
    .btn{
      width:100%; padding:13px;
      border-radius:8px; border:none;
      font-family:'Aptos','Segoe UI','Inter',sans-serif;
      font-size:11px; font-weight:400;
      letter-spacing:2.5px; 
      cursor:pointer; transition:all .25s; margin-top:8px;
    }
    .btn-primary{
      background:var(--accent);
      color:#fff;
      box-shadow:0 4px 20px rgba(139,92,246,0.3);
    }
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(59,130,246,0.45);}
    .btn-primary:active{transform:translateY(0);}

    .err{color:var(--danger);font-size:11px;text-align:center;margin-top:10px;min-height:16px;}
    .hint{
      text-align:center;margin-top:22px;
      font-size:11px;font-weight:400;color:var(--muted);letter-spacing:0.3px;
    }
    .hint span{color:var(--accent2);cursor:pointer;transition:color .2s;}
    .hint span:hover{color:var(--accent3);}

    .install-btn{
      display:none; align-items:center; justify-content:center; gap:8px;
      margin-top:14px; padding:11px;
      background:rgba(59,130,246,0.06);
      border:1px solid var(--border);
      border-radius:8px; cursor:pointer;
      font-size:11px; font-weight:400;
      letter-spacing:0.5px; color:var(--accent2);
      transition:all .2s;
    }
    .install-btn:hover{background:rgba(59,130,246,0.1);}

    /* Deco */
    .deco{position:fixed;top:22px;right:28px;display:flex;gap:5px;z-index:1;}
    .d{width:5px;height:5px;border-radius:50%;background:var(--accent);}
    .d:nth-child(1){opacity:.35;} .d:nth-child(2){opacity:.15;} .d:nth-child(3){opacity:.07;}

    .blue-line{
      position:fixed; bottom:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,var(--accent) 40%,var(--accent) 60%,transparent);
      opacity:.2;
    }
  </style>
</head>
<body>

  <div class="deco"><div class="d"></div><div class="d"></div><div class="d"></div></div>
  <div class="blue-line"></div>

  <div class="wrap">

    <div class="brand">
      <div class="brand-row">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24">
            <polyline points="3,17 8,10 13,14 21,6"/>
            <line x1="21" y1="6" x2="21" y2="12"/>
            <line x1="21" y1="6" x2="15" y2="6"/>
          </svg>
        </div>
        <div class="brand-name">Patrim<b>onia</b></div>
      </div>
      <div class="brand-tag">Wealth · Analytics · Fiscalité</div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Connexion</button>
        <button class="tab" onclick="switchTab('register')">Créer un compte</button>
      </div>

      <div id="loginForm">
        <div class="fg">
          <label>Email</label>
          <input type="text" id="loginUser" placeholder="votre@email.com" autocomplete="email"/>
        </div>
        <div class="fg">
          <label>Mot de passe</label>
          <input type="password" id="loginPass" placeholder="••••••••"
                 autocomplete="current-password"
                 onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
        <button class="btn btn-primary" onclick="doLogin()">Accéder →</button>
        <div class="err" id="loginError"></div>
      </div>

      <div id="registerForm" style="display:none">
        <div class="fg">
          <label>Email</label>
          <input type="text" id="regUser" placeholder="votre@email.com" autocomplete="email"/>
        </div>
        <div class="fg">
          <label>Mot de passe</label>
          <input type="password" id="regPass" placeholder="••••••••" autocomplete="new-password"/>
        </div>
        <div class="fg">
          <label>Confirmer</label>
          <input type="password" id="regPass2" placeholder="••••••••"
                 onkeydown="if(event.key==='Enter')doRegister()"/>
        </div>
        <button class="btn btn-primary" onclick="doRegister()">Créer mon espace →</button>
        <div class="err" id="registerError"></div>
      </div>
    </div>

    <div class="hint">
      Pas encore de compte ? <span onclick="switchTab('register')">Inscription gratuite</span>
    </div>

    <div id="installBtn" class="install-btn" onclick="installApp()">
      📲 &nbsp;Installer l'app sur votre téléphone
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 🔧 Configuration Supabase
    const SUPABASE_URL  = 'https://grvxurgvxwmheiollrmp.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdydnh1cmd2eHdtaGVpb2xscm1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTU4NjMsImV4cCI6MjA5MTY3MTg2M30.NJiTUMn36bRwuxUfiy94DH561ylv3bs-dpY6sDxaHnE';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    // Rediriger vers le dashboard si déjà connecté
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    function switchTab(t){
      document.querySelectorAll('.tab').forEach((el,i)=>
        el.classList.toggle('active',(t==='login'&&i===0)||(t==='register'&&i===1))
      );
      document.getElementById('loginForm').style.display=t==='login'?'':'none';
      document.getElementById('registerForm').style.display=t==='register'?'':'none';
    }

    async function doLogin(){
      const email = document.getElementById('loginUser').value.trim().toLowerCase();
      const pass  = document.getElementById('loginPass').value;
      const err   = document.getElementById('loginError');
      err.textContent = '';
      if(!email||!pass){ err.textContent='Remplissez tous les champs.'; return; }
      const btn = document.querySelector('#loginForm .btn-primary');
      btn.textContent = 'Connexion…'; btn.disabled = true;
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      btn.textContent = 'Accéder →'; btn.disabled = false;
      if(error){ err.textContent = 'Email ou mot de passe incorrect.'; return; }
      window.location.href = 'dashboard.html';
    }

    async function doRegister(){
      const email = document.getElementById('regUser').value.trim().toLowerCase();
      const pass  = document.getElementById('regPass').value;
      const pass2 = document.getElementById('regPass2').value;
      const err   = document.getElementById('registerError');
      err.textContent = '';
      
      if(!email||!pass){ err.textContent='Remplissez tous les champs.'; return; }
      if(pass!==pass2){ err.textContent='Les mots de passe ne correspondent pas.'; return; }
      if(pass.length<6){ err.textContent='Minimum 6 caractères.'; return; }
      
      const btn = document.querySelector('#registerForm .btn-primary');
      btn.textContent = 'Création…'; btn.disabled = true;
      
      // Inscription
      const { data, error } = await sb.auth.signUp({ email, password: pass });
      
      if(error){ 
        btn.textContent = 'Créer mon espace →'; btn.disabled = false;
        err.textContent = error.message; 
        return; 
      }

      // Si la session existe (confirm email OFF), on redirige de suite
      if(data.session) {
        err.style.color = 'var(--accent2)';
        err.textContent = 'Succès ! Redirection...';
        window.location.href = 'dashboard.html';
      } else {
        err.style.color = 'var(--accent2)';
        err.textContent = 'Compte créé ! Redirection en cours...';
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      }
    }

    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt',e=>{
      e.preventDefault(); deferredPrompt=e;
      document.getElementById('installBtn').style.display='flex';
    });
    function installApp(){ if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt=null; } }
  </script>
</body>
</html>
